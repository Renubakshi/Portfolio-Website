    <h2>Fixing Capitalization</h2>
    <div class="result">
        <ul></ul>
    </div>  

     <script>
         
         const list = document.querySelector('.result ul');
          
          
        const cities = ['mumBai', 'DELhi', 'JaIPuR', 'gOa'];
        for(let i=0 ; i<cities.length ;i++){
        let allLower = cities[i].toLowerCase();
        let firstAlpha = allLower.slice(0,1);
        let ans = allLower.replace(firstAlpha,firstAlpha.toUpperCase());
        let element = document.createElement('li');
        element.textContent= ans;
        // element.appendChild(ans);
        list.appendChild(element);
        }
        
    </script>
    <script src="object.js"></script>
